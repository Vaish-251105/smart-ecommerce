services:
  # 1. Backend Web Service (Django)
  - type: web
    name: smart-ecommerce-backend-vaish
    env: python
    buildCommand: "cd Backend && ./build.sh"
    startCommand: "cd Backend && gunicorn core.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-ecommerce-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "smart-ecommerce-backend-vaish.onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://smart-ecommerce-frontend-vaish.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://smart-ecommerce-frontend-vaish.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"
      # Third-party Integrations (Fill these in Render Dashboard)
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # 2. Frontend Static Site (React/Vite)
  - type: web
    name: smart-ecommerce-frontend-vaish
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "frontend/dist"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://smart-ecommerce-backend-vaish.onrender.com/api"
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false

databases:
  # 1. PostgreSQL Database
  - name: smart-ecommerce-db
    databaseName: smart_ecommerce
    user: smart_user
    plan: free
