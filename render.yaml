services:
  # 1. Backend Web Service (Django)
  - type: web
    name: smart-ecommerce-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi"
    rootDir: Backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-ecommerce-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True" # You can narrow this later to the frontend URL
      - key: PYTHON_VERSION
        value: "3.11.0"

  # 2. Frontend Static Site (React/Vite)
  - type: static
    name: smart-ecommerce-frontend
    buildCommand: "npm install && npm run build"
    publishDir: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: smart-ecommerce-backend
          property: host

databases:
  # 1. PostgreSQL Database
  - name: smart-ecommerce-db
    databaseName: smart_ecommerce
    user: smart_user
    plan: free # Change to a paid plan if needed
