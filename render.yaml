services:
  # 1. Backend Web Service (Django)
  - type: web
    name: smart-ecommerce-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn core.wsgi"
    rootDir: Backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: smart-ecommerce-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://smart-ecommerce-frontend.onrender.com"
      - key: PYTHON_VERSION
        value: "3.11.0"

  # 2. Frontend Static Site (React/Vite)
  - type: web
    name: smart-ecommerce-frontend
    runtime: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: ./dist
    rootDir: frontend
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://smart-ecommerce-backend.onrender.com/api"

databases:
  # 1. PostgreSQL Database
  - name: smart-ecommerce-db
    databaseName: smart_ecommerce
    user: smart_user
    plan: free # Change to a paid plan if needed
